version: '3.8'

services:
  django:
    build: .
    container_name: django_library_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./library:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
    stdin_open: true
    tty: true
